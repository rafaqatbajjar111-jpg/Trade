name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Compile and Bundle Build
        run: npm run build

      - name: Deploy static assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true

      - name: Upload Build Artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: dist
